<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Admin | Portfolio Dashboard</title>
  <link rel="stylesheet" href="admin.css">
</head>

<body>

  <!-- Login Screen -->
  <div id="login-screen" class="login-screen">
    <div class="login-card">
      <div class="lock-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
          <path d="M7 11V7a5 5 0 0 1 10 0v4" />
        </svg>
      </div>
      <h1>Admin Access</h1>
      <p>Enter your password to manage portfolio content</p>
      <form id="login-form">
        <input type="password" id="password-input" placeholder="Enter password" autocomplete="off" required />
        <button type="submit" class="login-btn">Sign In</button>
      </form>
      <div id="login-error" class="login-error">Incorrect password. Please try again.</div>
    </div>
  </div>

  <!-- Dashboard -->
  <div id="dashboard" class="dashboard">
    <div class="dashboard-header">
      <h1>Portfolio Dashboard</h1>
      <a href="../index.html" class="back-link">← Back to Site</a>
    </div>

    <!-- About Section Editor -->
    <div class="edit-card">
      <h2>About / Hero Section</h2>
      <div class="form-group">
        <label for="edit-greeting">Greeting</label>
        <input type="text" id="edit-greeting" placeholder="Hi, I am" />
      </div>
      <div class="form-group">
        <label for="edit-name">Full Name</label>
        <input type="text" id="edit-name" placeholder="Your name" />
      </div>
      <div class="form-group">
        <label for="edit-tagline">Tagline</label>
        <input type="text" id="edit-tagline" placeholder="Machine Learning & AI Researcher" />
      </div>
      <div class="form-group">
        <label for="edit-description">Bio / Description</label>
        <textarea id="edit-description" rows="4" placeholder="Write your bio..."></textarea>
      </div>
    </div>

    <!-- Skills Section Editor -->
    <div class="edit-card">
      <h2>Technical Skills</h2>
      <div id="skills-editor">
        <!-- Rendered by JS -->
      </div>
      <button class="btn-add" onclick="addSkill()">+ Add Skill Category</button>
    </div>

    <!-- Projects Section Editor -->
    <div class="edit-card">
      <h2>Projects</h2>
      <div id="projects-editor">
        <!-- Rendered by JS -->
      </div>
      <button class="btn-add" onclick="addProject()">+ Add Project</button>
    </div>

    <!-- Contact Section Editor -->
    <div class="edit-card">
      <h2>Contact</h2>
      <div class="form-group">
        <label for="edit-email">Email Address</label>
        <input type="email" id="edit-email" placeholder="your@email.com" />
      </div>
    </div>

    <!-- Save Button -->
    <button class="btn-save" onclick="saveAll()">Save Changes</button>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="toast"></div>

  <!-- Scripts -->
  <script src="../js/site-data.js"></script>
  <script src="admin.js"></script>

</body>

</html>
